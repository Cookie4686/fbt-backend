syntax = "proto3";

package auth.v1;

import "auth/v1/common.proto";
import "auth/v1/predefined_string_rules.proto";
import "buf/validate/validate.proto";

service CredentialService {
  rpc Register(CredentialServiceRegisterRequest) returns (CredentialServiceRegisterResponse) {}
  rpc Login(CredentialServiceLoginRequest) returns (CredentialServiceLoginResponse) {}
}

message CredentialServiceRegisterRequest {
  string username = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(username_component) = true
  ];
  string password = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(password_component) = true
  ];
  string email = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.email = true
  ];
}
message CredentialServiceRegisterResponse {
  Session session = 1 [(buf.validate.field).required = true];
}

message CredentialServiceLoginRequest {
  string username = 1 [(buf.validate.field).string.(username_component) = true];
  string password = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(password_component) = true
  ];
}
message CredentialServiceLoginResponse {
  Session session = 1 [(buf.validate.field).required = true];
}
