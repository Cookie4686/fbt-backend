syntax = "proto3";

package user;
option go_package = "internal/domain/auth/features/user/pb";

import "common/user.proto";

service User {
  rpc GetByUsername (GetByUsernameRequest) returns (GetByUsernameReply) {}
}

message GetByUsernameRequest {
    string username = 1;
}
message GetByUsernameReply {
    common.User user = 1;
}