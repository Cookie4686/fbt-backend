syntax = "proto3";

package account;
option go_package = "internal/domain/bookkeeping/features/account/pb";

service AccountService {
  rpc GetAll (GetAllRequest) returns (GetAllReply) {}
  rpc Create (CreateRequest) returns (CreateReply) {}
  rpc Update (UpdateRequest) returns (UpdateReply) {}
  rpc Delete (DeleteRequest) returns (DeleteReply) {}
}

message Account {
  int32 id = 1;
  string name = 2;
  bool isDebit = 3;
  string userID = 4;
}

message GetAllRequest {}
message GetAllReply {
    repeated Account account = 1;
}

message CreateRequest {
  string name = 1;
  bool isDebit = 2;
}
message CreateReply {
    Account account = 1;
}

message UpdateRequest {
  int32 id = 1;
  string name = 2;
  bool isDebit = 3;
}
message UpdateReply {
    Account account = 1;
}

message DeleteRequest {
  int32 id = 1;
}
message DeleteReply {}