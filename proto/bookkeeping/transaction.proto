syntax = "proto3";

package transaction;
option go_package = "internal/domain/bookkeeping/features/transaction/pb";

import "google/protobuf/timestamp.proto";

service Transaction {
  rpc GetAll (GetAllRequest) returns (GetAllReply) {}
  rpc Create (CreateRequest) returns (CreateReply) {}
  rpc Update (UpdateRequest) returns (UpdateReply) {}
  rpc Delete (DeleteRequest) returns (DeleteReply) {}
}

message TransactionEntry {
    int64 id = 1;
    google.protobuf.Timestamp time = 2;
    repeated Entry entries = 3;
}

message Entry {
    int32 accountID = 1;
    float amount = 2;
}

message GetAllRequest {}
message GetAllReply {
    repeated TransactionEntry transactionEntry = 1;
}

message CreateRequest {
    google.protobuf.Timestamp time = 1;
    repeated Entry entries = 2;
}
message CreateReply {
    TransactionEntry transactionEntry = 1;
}

message UpdateRequest {
    TransactionEntry transactionEntry = 1;
}
message UpdateReply {
    TransactionEntry transactionEntry = 1;
}

message DeleteRequest {
  int64 id = 1;
}
message DeleteReply {}